name: Análisis Estático y Calidad de Código

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-analysis:
    runs-on: ubuntu-latest
    name: Análisis Estático

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar análisis con Maven
        run: mvn clean verify

      - name: Generar reporte de calidad
        if: success()
        run: |
          echo "📊 Análisis de Calidad Completado"
          echo "✅ Código compilado exitosamente"
          echo "✅ Todas las pruebas pasaron"
          echo "✅ Sin errores de compilación"
