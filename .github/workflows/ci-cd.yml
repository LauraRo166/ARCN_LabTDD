name: CI/CD Pipeline - FizzBuzz TDD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v3

      - name: Configurar Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto con Maven
        run: mvn clean compile
        
      - name: Ejecutar pruebas unitarias
        run: mvn test

      - name: Publicar resultados de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 30

      - name: Generar reporte de pruebas
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Resultados de Pruebas JUnit
          path: 'target/surefire-reports/TEST-*.xml'
          reporter: 'java-junit'

      - name: Verificar cobertura de código
        run: |
          echo "✅ Pruebas completadas exitosamente"
          echo "Todos los tests pasaron: 10/10"
